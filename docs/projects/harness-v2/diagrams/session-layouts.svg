<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 850" font-family="JetBrains Mono, monospace" font-size="11">
  <rect width="900" height="850" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" fill="#e0e0e0" font-size="16" font-weight="bold" text-anchor="middle">Session Layouts: Hidden-Window Architecture</text>

  <!-- Window architecture note -->
  <rect x="30" y="42" width="840" height="48" fill="#12121f" stroke="#444" stroke-width="1" rx="4"/>
  <text x="40" y="60" fill="#ffcc80" font-size="10" font-weight="bold">Window numbering (sidebar/tracker mode):</text>
  <text x="40" y="76" fill="#78909c" font-size="10">Window 0: Codex (hidden, background — agent window, dimmed in status bar)</text>
  <text x="470" y="76" fill="#78909c" font-size="10">Window 1: party-cli | Claude | Shell (active, workspace — bright in status bar)</text>

  <!-- Layout 1: Standard/Worker with TUI Sidebar -->
  <text x="30" y="115" fill="#4a9eff" font-weight="bold" font-size="13">Standard / Worker Session</text>

  <!-- Window 0: Codex (hidden) -->
  <rect x="30" y="125" width="840" height="40" fill="#0d1117" stroke="#30363d" stroke-width="1" rx="4" stroke-dasharray="4,2"/>
  <text x="40" y="147" fill="#555" font-size="10">Window 0 (hidden): Codex — tmux-codex.sh targets this window; user rarely sees it</text>
  <text x="700" y="147" fill="#555" font-size="9">dimmed in status bar</text>

  <!-- Window 1: party-cli | Claude | Shell -->
  <rect x="30" y="170" width="840" height="190" fill="#0d1117" stroke="#30363d" stroke-width="2" rx="4"/>
  <text x="40" y="188" fill="#4a9eff" font-size="9">Window 1 (active):</text>

  <!-- Pane 0: party-cli TUI (20%) -->
  <rect x="35" y="195" width="164" height="160" fill="#161b22" stroke="#7c4dff" stroke-width="1.5" rx="3"/>
  <text x="117" y="212" fill="#ce93d8" font-weight="bold" text-anchor="middle" font-size="10">party-cli TUI (20%)</text>
  <line x1="40" y1="218" x2="194" y2="218" stroke="#30363d" stroke-width="1"/>
  <text x="42" y="232" fill="#4caf50" font-size="10">Codex ● idle</text>
  <text x="42" y="246" fill="#78909c" font-size="10">Last: APPROVED</text>
  <text x="42" y="260" fill="#78909c" font-size="10">Hash: a3f2..c1</text>
  <line x1="40" y1="268" x2="194" y2="268" stroke="#30363d" stroke-width="1"/>
  <text x="42" y="282" fill="#b0bec5" font-size="10">Session info</text>
  <text x="42" y="296" fill="#78909c" font-size="10">branch: feat-x</text>
  <text x="42" y="310" fill="#78909c" font-size="10">cwd: ~/Code/app</text>
  <line x1="40" y1="318" x2="194" y2="318" stroke="#30363d" stroke-width="1"/>
  <text x="42" y="332" fill="#4a9eff" font-size="9">[P]eek [E]vidence</text>
  <text x="42" y="346" fill="#4a9eff" font-size="9">[L]og  [H]elp</text>

  <!-- Pane 1: Claude Console (45%) -->
  <rect x="204" y="195" width="369" height="160" fill="#161b22" stroke="#4a9eff" stroke-width="1.5" rx="3"/>
  <text x="388" y="212" fill="#4a9eff" font-weight="bold" text-anchor="middle" font-size="10">Claude Console (45%)</text>
  <line x1="209" y1="218" x2="568" y2="218" stroke="#30363d" stroke-width="1"/>
  <text x="214" y="235" fill="#78909c" font-size="10">⏺ Reading file session/party.sh...</text>
  <text x="214" y="252" fill="#78909c" font-size="10">⏺ I'll fix the unquoted $lib_path</text>
  <text x="214" y="269" fill="#78909c" font-size="10">  in the tmux hook registration.</text>
  <text x="214" y="286" fill="#78909c" font-size="10">⏺ Edit: session/party.sh:83</text>
  <text x="214" y="316" fill="#4caf50" font-size="10">❯ _</text>

  <!-- Pane 2: Shell (35%) -->
  <rect x="578" y="195" width="287" height="160" fill="#161b22" stroke="#78909c" stroke-width="1" rx="3"/>
  <text x="721" y="212" fill="#b0bec5" font-weight="bold" text-anchor="middle" font-size="10">Shell (35%)</text>
  <line x1="583" y1="218" x2="860" y2="218" stroke="#30363d" stroke-width="1"/>
  <text x="588" y="235" fill="#78909c" font-size="10">$ git status</text>
  <text x="588" y="252" fill="#4caf50" font-size="10">On branch feat-x</text>
  <text x="588" y="269" fill="#78909c" font-size="10">$ _</text>

  <!-- Layout 2: Master with TUI Tracker -->
  <text x="30" y="395" fill="#ff9800" font-weight="bold" font-size="13">Master Session</text>

  <!-- Note: Direct masters have no window 0; promoted masters retain it from worker origin -->
  <rect x="30" y="405" width="840" height="40" fill="#0d1117" stroke="#30363d" stroke-width="1" rx="4" stroke-dasharray="4,2"/>
  <text x="40" y="427" fill="#555" font-size="10">Direct masters: no window 0 (no Codex). Promoted masters: retain window 0 from worker origin.</text>
  <text x="700" y="427" fill="#555" font-size="9">varies by origin</text>

  <!-- Window 1: tracker | claude | shell -->
  <rect x="30" y="450" width="840" height="190" fill="#0d1117" stroke="#30363d" stroke-width="2" rx="4"/>
  <text x="40" y="468" fill="#ff9800" font-size="9">Window 1 (active):</text>

  <!-- Pane 0: party-cli TUI (tracker mode, 20%) -->
  <rect x="35" y="475" width="164" height="160" fill="#161b22" stroke="#ff9800" stroke-width="1.5" rx="3"/>
  <text x="117" y="492" fill="#ffcc80" font-weight="bold" text-anchor="middle" font-size="10">party-cli TUI (20%)</text>
  <line x1="40" y1="498" x2="194" y2="498" stroke="#30363d" stroke-width="1"/>
  <text x="42" y="512" fill="#ffcc80" font-size="10">Workers (3):</text>
  <text x="42" y="528" fill="#4caf50" font-size="10">▸ ● sidebar-fix</text>
  <text x="50" y="542" fill="#78909c" font-size="9">  reading tests...</text>
  <text x="42" y="558" fill="#4caf50" font-size="10">  ● auth-refac</text>
  <text x="50" y="572" fill="#78909c" font-size="9">  running critic</text>
  <text x="42" y="588" fill="#f44336" font-size="10">  ○ db-migrate</text>
  <text x="50" y="602" fill="#78909c" font-size="9">  stopped</text>
  <line x1="40" y1="610" x2="194" y2="610" stroke="#30363d" stroke-width="1"/>
  <text x="42" y="625" fill="#4a9eff" font-size="9">[R]elay [B]cast [S]pawn</text>

  <!-- Pane 1: Claude Console (orchestrator, 45%) -->
  <rect x="204" y="475" width="369" height="160" fill="#161b22" stroke="#ff9800" stroke-width="1.5" rx="3"/>
  <text x="388" y="492" fill="#ff9800" font-weight="bold" text-anchor="middle" font-size="10">Claude Console — Orchestrator (45%)</text>
  <line x1="209" y1="498" x2="568" y2="498" stroke="#30363d" stroke-width="1"/>
  <text x="214" y="515" fill="#78909c" font-size="10">⏺ Dispatching bugfix to worker-2</text>
  <text x="214" y="532" fill="#78909c" font-size="10">⏺ Worker sidebar-fix reports: PR</text>
  <text x="214" y="549" fill="#78909c" font-size="10">  ready at #59, tests passing.</text>
  <text x="214" y="579" fill="#4caf50" font-size="10">❯ _</text>

  <!-- Pane 2: Shell (35%) -->
  <rect x="578" y="475" width="287" height="160" fill="#161b22" stroke="#78909c" stroke-width="1" rx="3"/>
  <text x="721" y="492" fill="#b0bec5" font-weight="bold" text-anchor="middle" font-size="10">Shell (35%)</text>
  <line x1="583" y1="498" x2="860" y2="498" stroke="#30363d" stroke-width="1"/>
  <text x="588" y="515" fill="#78909c" font-size="10">$ gh pr list</text>
  <text x="588" y="532" fill="#78909c" font-size="10">#59 sidebar-fix</text>
  <text x="588" y="549" fill="#78909c" font-size="10">#58 phase-simp</text>

  <!-- Layout 3: Classic Fallback -->
  <text x="30" y="675" fill="#78909c" font-weight="bold" font-size="13">Classic Fallback (PARTY_LAYOUT=classic)</text>

  <rect x="30" y="685" width="840" height="110" fill="#0d1117" stroke="#30363d" stroke-width="2" rx="4"/>

  <!-- Pane 0: Codex (visible, 33%) -->
  <rect x="35" y="690" width="273" height="100" fill="#161b22" stroke="#7c4dff" stroke-width="1" rx="3"/>
  <text x="171" y="707" fill="#ce93d8" font-weight="bold" text-anchor="middle" font-size="10">Codex Pane (33%)</text>
  <line x1="40" y1="713" x2="303" y2="713" stroke="#30363d" stroke-width="1"/>
  <text x="45" y="730" fill="#78909c" font-size="10">Visible Codex pane (original)</text>
  <text x="45" y="747" fill="#78909c" font-size="10">No hidden window, no party-cli TUI</text>

  <!-- Pane 1: Claude (33%) -->
  <rect x="313" y="690" width="273" height="100" fill="#161b22" stroke="#4a9eff" stroke-width="1" rx="3"/>
  <text x="449" y="707" fill="#4a9eff" font-weight="bold" text-anchor="middle" font-size="10">Claude Console (33%)</text>
  <line x1="318" y1="713" x2="581" y2="713" stroke="#30363d" stroke-width="1"/>
  <text x="323" y="730" fill="#78909c" font-size="10">Standard 3-pane layout</text>
  <text x="323" y="747" fill="#78909c" font-size="10">Original UX, no TUI sidebar</text>

  <!-- Pane 2: Shell (33%) -->
  <rect x="591" y="690" width="274" height="100" fill="#161b22" stroke="#78909c" stroke-width="1" rx="3"/>
  <text x="728" y="707" fill="#b0bec5" font-weight="bold" text-anchor="middle" font-size="10">Shell (33%)</text>
  <line x1="596" y1="713" x2="860" y2="713" stroke="#30363d" stroke-width="1"/>
  <text x="601" y="730" fill="#78909c" font-size="10">$ _</text>

  <!-- Notes -->
  <text x="30" y="815" fill="#78909c" font-size="10">Hidden-window model: Window 0 = Codex (agent, hidden); Window 1 = party-cli | Claude | Shell (workspace, active on launch).</text>
  <text x="30" y="832" fill="#78909c" font-size="10">Session death kills all windows — no orphan cleanup needed. User-added windows go to 2, 3, 4... Status bar dims agent windows, highlights workspace.</text>
  <text x="30" y="849" fill="#78909c" font-size="10">Classic layout preserves backward compatibility: single window, no hidden Codex window, 33/33/33 split matches legacy behavior.</text>
</svg>
